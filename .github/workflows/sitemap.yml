name: Generate Sitemap

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          BASE_URL="https://pikoclaw.com"
          OUTPUT="docs/sitemap.xml"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo '<?xml version="1.0" encoding="UTF-8"?>' > "$OUTPUT"
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> "$OUTPUT"

          find docs -name "*.html" \
            ! -name "404.html" \
            | sort \
            | while read -r file; do
                # Strip "docs/" prefix and "index.html" suffix to get clean URL path
                path="${file#docs/}"
                path="${path%index.html}"
                path="${path%.html}"
                # Ensure trailing slash for directories, no trailing slash for pages
                if [[ "$path" == */ ]] || [[ "$path" == "" ]]; then
                  url="${BASE_URL}/${path}"
                else
                  url="${BASE_URL}/${path}/"
                fi
                echo "  <url>" >> "$OUTPUT"
                echo "    <loc>${url}</loc>" >> "$OUTPUT"
                echo "    <lastmod>${NOW}</lastmod>" >> "$OUTPUT"
                echo "  </url>" >> "$OUTPUT"
              done

          echo '</urlset>' >> "$OUTPUT"
          echo "Generated $OUTPUT"
          cat "$OUTPUT"

      - name: Commit sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to sitemap"
          else
            git commit -m "chore: update sitemap.xml"
            git push
          fi
